{% extends "base.html" %}

{% block content %}
<header style="padding: 24px 0; border-bottom: 1px solid var(--border-precision); margin-bottom: 32px;">
    <div style="max-width: 650px; margin: 0 auto;">
        <span style="color: var(--precision-blue); font-weight: 700; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em;">Administration</span>
        <h1 style="font-size: 2.2rem; font-weight: 800; color: var(--ink-black); margin: 4px 0 0 0; letter-spacing: -0.04em;">New Entity.</h1>
        <p style="color: var(black); margin-top: 8px; font-size: 0.85rem; font-weight: 500;">Provision a new subscription node to the central database registry.</p>
    </div>
</header>

<div class="data-surface" style="max-width: 650px; margin: 0 auto; padding: 40px; background: white; border: 1px solid var(--border-precision); border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.02);">
    <form action="/add-customer" method="post" id="provisionForm">
        
        <div style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
                Legal Customer Name
            </label>
            <input type="text" name="customer_name" placeholder="Full legal name or organization" required 
                   style="width: 100%; padding: 12px; border: 1px solid var(--border-precision); border-radius: 4px; font-size: 0.9rem; font-family: inherit; background: var(--ghost-zinc); outline: none; transition: all 0.2s;"
                   onfocus="this.style.borderColor='var(--ink-black)'; this.style.background='white';"
                   onblur="this.style.borderColor='var(--border-precision)'; this.style.background='var(--ghost-zinc)';">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
            <div>
                <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
                    Email Address
                </label>
                <input type="email" name="email" placeholder="contact@company.com" required 
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-precision); border-radius: 4px; font-size: 0.9rem; font-family: inherit; background: white; outline: none; transition: border 0.2s;"
                       onfocus="this.style.borderColor='var(--ink-black)'" onblur="this.style.borderColor='var(--border-precision)'">
            </div>
            <div>
                <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
                    Contact Phone
                </label>
                <input type="text" name="contact_phone" placeholder="+1 (000) 000-0000" 
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-precision); border-radius: 4px; font-size: 0.9rem; font-family: inherit; background: white; outline: none; transition: border 0.2s;"
                       onfocus="this.style.borderColor='var(--ink-black)'" onblur="this.style.borderColor='var(--border-precision)'">
            </div>
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
                Billing / Company Address
            </label>
            <textarea name="company_address" rows="2" placeholder="Primary headquarters or billing street address"
                      style="width: 100%; padding: 12px; border: 1px solid var(--border-precision); border-radius: 4px; font-size: 0.9rem; font-family: inherit; background: white; outline: none; resize: none; transition: border 0.2s;"
                      onfocus="this.style.borderColor='var(--ink-black)'" onblur="this.style.borderColor='var(--border-precision)'"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; padding-top: 24px; border-top: 1px solid var(--border-precision);">
            <div>
                <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
                    Service Tier
                </label>
                <select name="plan_type" id="tierSelector" required 
                        style="width: 100%; padding: 12px; border: 1px solid var(--border-precision); border-radius: 4px; background: var(--ghost-zinc); font-size: 0.85rem; font-family: inherit; font-weight: 700; cursor: pointer; outline: none;"
                        onchange="updateYieldPreview()">
                    <option value="Basic">Basic Tier</option>
                    <option value="Pro">Professional Tier</option>
                    <option value="Enterprise">Enterprise Tier</option>
                </select>
            </div>
            <div>
                <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--zinc-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">
                    Initial Network Status
                </label>
                <select name="status" required 
                        style="width: 100%; padding: 12px; border: 1px solid var(--border-precision); border-radius: 4px; background: var(--ghost-zinc); font-size: 0.85rem; font-family: inherit; font-weight: 700; cursor: pointer; outline: none;">
                    <option value="active">Active Entry</option>
                    <option value="cancelled">On Hold / Pending</option>
                </select>
            </div>
        </div>

        <div id="yieldPreview" style="background: var(--ghost-zinc); padding: 16px; border-radius: 4px; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--precision-blue);">
            <div>
                <span style="display: block; font-size: 0.55rem; font-weight: 800; color: var(--zinc-500); text-transform: uppercase;">Estimated Monthly Yield</span>
                <span id="yieldValue" style="font-family: monospace; font-size: 1.2rem; font-weight: 800; color: var(--ink-black);">$10.00</span>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button type="submit" class="btn-elite" style="width: 100%; justify-content: center; padding: 16px; font-size: 0.75rem; border-radius: 4px; background: var(--ink-black); color: white; border: none; cursor: pointer; transition: opacity 0.2s;" 
                    onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                Confirm & Deploy Subscription
            </button>
            <a href="/customers" style="text-align: center; font-size: 0.7rem; color: var(--zinc-400); text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px;">
                Discard Changes
            </a>
        </div>
    </form>
</div>

<div style="max-width: 650px; margin: 32px auto; display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-top: 1px solid var(--border-precision);">
    <div style="font-size: 0.6rem; color: var(--zinc-400); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 6px;">
    </div>
</div>

<script>
/**
 * Updates the Yield Preview based on selected Service Tier
 */
function updateYieldPreview() {
    const tier = document.getElementById('tierSelector').value;
    const yieldValue = document.getElementById('yieldValue');
    
    const prices = {
        'Basic': '$10.00',
        'Pro': '$30.00',
        'Enterprise': '$100.00'
    };
    
    yieldValue.innerText = prices[tier] || '$0.00';
    
    // Quick animation effect
    yieldValue.style.opacity = '0';
    setTimeout(() => {
        yieldValue.style.opacity = '1';
        yieldValue.style.transition = 'opacity 0.2s ease-in';
    }, 50);
}

// Initialize on load
window.onload = updateYieldPreview;
</script>
{% endblock %}
